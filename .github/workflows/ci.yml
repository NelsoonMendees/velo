# Workflow de Integração Contínua focado exclusivamente na execução de testes unitários.
# Estrutura enxuta e organizada, preparada para expansão futura com novos jobs/etapas.

name: Continuous Integration

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '24'
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}

jobs:
  # Job responsável pela validação unitária da aplicação
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      # Obtém o código-fonte mais recente do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Configura o ambiente Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # Instala as dependências do projeto
      - name: Install dependencies
        run: yarn install

      # Executa os testes unitários com Vitest
      - name: Run unit tests
        run: yarn test:unit

  build-and-deploy:
    name: Build and Deploy Vercel Preview
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Pull Vercel Config
        run: yarn vercel pull --yes --environment=preview --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE

      - name: Build application
        run: yarn vercel build --token=$VERCEL_TOKEN

      # Etapa de deploy
      - name: Deploy to Vercel Preview
        run: yarn vercel deploy --prebuilt --target=preview --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE
